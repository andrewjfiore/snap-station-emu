# splat configuration for kiosk Snap Station ROM NTSC-U (NPHE).
#
# No public decomp exists for NPHE as of this commit. This file is a
# conservative skeleton: split the ROM header and boot, then a single
# asm blob for the remainder. Community contributions should carve
# subsegments out of `main` as Ghidra analysis lands. Cross-validate
# against the NPFE config since the two ROMs share substantial libultra
# and HAL engine code.
#
# Usage (from repo root):
#   git submodule update --init tools/splat
#   python tools/splat/split.py emu/config/nphe.yaml

name: snapstation_nphe_us
sha1: null   # pinned by emu/tools/extract_rom.py after first run
options:
  platform: n64
  compiler: IDO
  basename: snapstation
  target_path: rom/nphe.z64
  base_path: build/nphe
  asm_path: asm/nphe
  src_path: src/nphe
  asset_path: assets/nphe
  symbol_addrs_path: symbols_nphe.txt
  undefined_funcs_auto_path: undefined_funcs_auto_nphe.txt
  undefined_syms_auto_path: undefined_syms_auto_nphe.txt
  find_file_boundaries: true
  header_encoding: ASCII
segments:
  - name: header
    type: header
    start: 0x0
  - name: boot
    type: bin
    start: 0x40
  - name: main
    type: code
    start: 0x1000
    vram: 0x80000400
    subsegments:
      - [0x1000, asm]
  - [0xFFFFFF]
